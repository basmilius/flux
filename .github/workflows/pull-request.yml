name: Pull Request

on:
    pull_request:

concurrency:
    cancel-in-progress: true
    group: ${{ format('ci-{0}', github.ref) }}

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
    contents: read
    deployments: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: 🚀 Build and preview
        steps:
            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: ✨ Setup node 25.x
                uses: actions/setup-node@v6
                with:
                    node-version: '25.x'
                    registry-url: https://registry.npmjs.org

            -   name: ⚙️ Setup Bun
                uses: oven-sh/setup-bun@v2

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile
                env:
                    FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

            -   name: 🔨 Build
                run: |
                    bun --cwd packages/internals build
                    bun --cwd packages/components build
                    bun --cwd packages/application build
                    bun --cwd packages/dashboard build
                    bun --cwd packages/statistics build
                    bun --cwd docs build
                env:
                    FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

            -   name: 🚀 Publish Docs
                uses: cloudflare/wrangler-action@v3
                id: publish
                with:
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    command: pages deploy . --project-name=fluxui --branch=${{ github.head_ref || github.ref_name }}
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    packageManager: bun
                    workingDirectory: docs/.vitepress/dist
                env:
                    FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

            -   name: ⭐️ Output
                run: |
                    echo "Build ID: ${{ steps.publish.outputs.pages-deployment-id }}"
                    echo "Publish URL: ${{ steps.publish.outputs.deployment-url }}"
                    echo "Environment: ${{ steps.publish.outputs.pages-environment }}"
                    echo "Alias: ${{ steps.publish.outputs.pages-deployment-alias-url }}"
