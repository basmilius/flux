name: 🚀 Release packages

on:
    release:
        types: [ prereleased, released ]

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: 🚀 Publish to Registry
        steps:
            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: 🍞 Setup Bun
                uses: oven-sh/setup-bun@v2

            -   name: ✨ Setup node 25.x
                uses: actions/setup-node@v6
                with:
                    node-version: '25.x'
                    registry-url: https://registry.npmjs.org

            -   name: ✏️ Tag v${{ env.RELEASE_VERSION }}
                run: |
                    bun pm version --cwd packages/types ${{ env.RELEASE_VERSION }}
                    bun pm version --cwd packages/internals ${{ env.RELEASE_VERSION }}
                    bun pm version --cwd packages/components ${{ env.RELEASE_VERSION }}
                    bun pm version --cwd packages/application ${{ env.RELEASE_VERSION }}
                    bun pm version --cwd packages/dashboard ${{ env.RELEASE_VERSION }}
                    bun pm version --cwd packages/statistics ${{ env.RELEASE_VERSION }}
                    
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/types/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/internals/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/components/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/application/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/dashboard/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/statistics/package.json

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile
                env:
                    FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

            -   name: 🔨 Build
                run: |
                    bun --cwd packages/internals build
                    bun --cwd packages/components build
                    bun --cwd packages/application build
                    bun --cwd packages/dashboard build
                    bun --cwd packages/statistics build
                    node scripts/transform-dts.mjs
                    bun --cwd docs build

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }} (Pre-release)
                if: ${{ github.event.release.prerelease }}
                run: |
                    (cd packages/types && npm publish --access public --tag next)
                    (cd packages/internals && npm publish --access public --tag next)
                    (cd packages/components && npm publish --access public --tag next)
                    (cd packages/application && npm publish --access public --tag next)
                    (cd packages/dashboard && npm publish --access public --tag next)
                    (cd packages/statistics && npm publish --access public --tag next)

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }}
                if: ${{ !github.event.release.prerelease }}
                run: |
                    (cd packages/types && npm publish --access public)
                    (cd packages/internals && npm publish --access public)
                    (cd packages/components && npm publish --access public)
                    (cd packages/application && npm publish --access public)
                    (cd packages/dashboard && npm publish --access public)
                    (cd packages/statistics && npm publish --access public)

            -   name: 🚀 Publish Docs (Pre-release)
                uses: cloudflare/wrangler-action@v3
                if: ${{ github.event.release.prerelease }}
                with:
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    command: versions upload --tag prerelease-${{ env.RELEASE_VERSION }}
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    wranglerVersion: "4.69.0"

            -   name: 🚀 Publish Docs
                uses: cloudflare/wrangler-action@v3
                if: ${{ !github.event.release.prerelease }}
                with:
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    wranglerVersion: "4.69.0"
