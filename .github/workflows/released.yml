name: 🚀 Release packages

on:
    release:
        types: [ prereleased, released ]
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to publish (e.g. 3.4.0 or 3.4.0-beta.1)'
                required: true
                type: string
            prerelease:
                description: 'Publish under the "next" dist-tag'
                required: false
                default: false
                type: boolean

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
    IS_PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: 🚀 Publish to Registry
        steps:
            -   name: 🔒 Validate release version
                run: |
                    if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
                        echo "::error::Invalid release version '$RELEASE_VERSION'; expected a semver like 1.2.3 or 1.2.3-beta.1."
                        exit 1
                    fi

            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: 🍞 Setup Bun
                uses: oven-sh/setup-bun@v2

            -   name: ✨ Setup node 25.x
                uses: actions/setup-node@v6
                with:
                    node-version: '25.x'
                    registry-url: https://registry.npmjs.org

            -   name: ✏️ Tag v${{ env.RELEASE_VERSION }}
                run: |
                    bun pm version --cwd packages/types "$RELEASE_VERSION"
                    bun pm version --cwd packages/internals "$RELEASE_VERSION"
                    bun pm version --cwd packages/visuals "$RELEASE_VERSION"
                    bun pm version --cwd packages/components "$RELEASE_VERSION"
                    bun pm version --cwd packages/application "$RELEASE_VERSION"
                    bun pm version --cwd packages/statistics "$RELEASE_VERSION"
                    bun pm version --cwd packages/flow "$RELEASE_VERSION"
                    bun pm version --cwd packages/skill "$RELEASE_VERSION"

                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/types/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/internals/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/visuals/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/components/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/application/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/statistics/package.json
                    sed -i "s/workspace:\*/$RELEASE_VERSION/g" packages/flow/package.json

                    sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$RELEASE_VERSION\"/" packages/skill/.claude-plugin/plugin.json

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile
                env:
                    FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

            -   name: 🔨 Build
                run: |
                    bun --cwd packages/internals build
                    bun --cwd packages/visuals build
                    bun --cwd packages/components build
                    bun --cwd packages/application build
                    bun --cwd packages/statistics build
                    bun --cwd packages/flow build
                    node scripts/transform-dts.mjs
                    bun --cwd docs build

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }}
                run: |
                    tag_args=()
                    if [[ "$IS_PRERELEASE" == "true" ]]; then
                        tag_args=(--tag next)
                    fi

                    publish() {
                        local dir="packages/$1"
                        local name version
                        name=$(node -p "require('./$dir/package.json').name")
                        version=$(node -p "require('./$dir/package.json').version")

                        if npm view "$name@$version" version >/dev/null 2>&1; then
                            echo "::notice::$name@$version is already published, skipping."
                            return 0
                        fi

                        (cd "$dir" && npm publish --access public "${tag_args[@]}")
                    }

                    for pkg in types internals visuals components application statistics flow skill; do
                        publish "$pkg"
                    done

            -   name: 🚀 Publish Docs (Pre-release)
                uses: cloudflare/wrangler-action@v3
                if: ${{ env.IS_PRERELEASE == 'true' }}
                with:
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    command: versions upload --tag prerelease-${{ env.RELEASE_VERSION }}
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    wranglerVersion: "4.69.0"

            -   name: 🚀 Publish Docs
                uses: cloudflare/wrangler-action@v3
                if: ${{ env.IS_PRERELEASE != 'true' }}
                with:
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    wranglerVersion: "4.69.0"
